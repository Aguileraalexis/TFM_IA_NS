services:
  demo-app:
    build:
      context: ..
      dockerfile: ns-framework-demo/Dockerfile
    container_name: ns-framework-demo-app
    ports:
      - "8080:8080"
    environment:
      DEMO_TRAVEL_INTERPRETER_TYPE: ${DEMO_TRAVEL_INTERPRETER_TYPE:-rule-based}
      DEMO_TRAVEL_LLM_ENDPOINT: ${DEMO_TRAVEL_LLM_ENDPOINT:-http://host.docker.internal:11434/api/generate}
      DEMO_TRAVEL_LLM_API_KEY: ${DEMO_TRAVEL_LLM_API_KEY:-}
      DEMO_TRAVEL_LLM_TIMEOUT: ${DEMO_TRAVEL_LLM_TIMEOUT:-180s}
      DEMO_TRAVEL_LLM_MODEL: ${DEMO_TRAVEL_LLM_MODEL:-llama3.1:latest}
      DEMO_TRAVEL_SERVICES_HOTEL_URL: ${DEMO_TRAVEL_SERVICES_HOTEL_URL:-http://host.docker.internal:8082}
      DEMO_TRAVEL_SERVICES_FLIGHT_URL: ${DEMO_TRAVEL_SERVICES_FLIGHT_URL:-http://host.docker.internal:8084}
      DEMO_TRAVEL_SERVICES_TOURISM_URL: ${DEMO_TRAVEL_SERVICES_TOURISM_URL:-http://host.docker.internal:8085}
      DOCKER_HOST: ${DOCKER_HOST:-}
      JAVA_TOOL_OPTIONS: -Djava.io.tmpdir=/planner-tmp
    volumes:
      - planner-tmp:/planner-tmp
    restart: unless-stopped

volumes:
  planner-tmp:

