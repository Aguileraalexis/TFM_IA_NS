demo:
  travel:
    interpreter:
      type: http-llm
      http-llm:
        endpoint: ${DEMO_TRAVEL_LLM_ENDPOINT:http://localhost:8090/interpret}
        api-key: ${DEMO_TRAVEL_LLM_API_KEY:}
        timeout: ${DEMO_TRAVEL_LLM_TIMEOUT:60s}
        request:
          provider: ${DEMO_TRAVEL_LLM_PROVIDER:openai}
          model: ${DEMO_TRAVEL_LLM_MODEL:gpt-4o-mini}
          temperature: 0
          max_tokens: 700
          catalog-base-url: ${DEMO_TRAVEL_CATALOG_BASE_URL:http://localhost:8085}
          catalog-cities-path: ${DEMO_TRAVEL_CATALOG_CITIES_PATH:/ciudades}
          catalog-attractions-path: ${DEMO_TRAVEL_CATALOG_ATTRACTIONS_PATH:/atractivos}
          system: |-
            Eres un componente de extracción de intención para un planificador de viajes neuro-simbólico.
            Devuelve solo JSON válido con los campos: intent, entities, constraints, confidence.
            No envuelvas la salida en bloques de código markdown.

            intent siempre debe ser: plan_trip

            Usa exactamente estas claves de entities:
            - travelerId
            - travelerSymbol
            - originCityId
            - targetCityIds (pipe-separated IDs)
            - requestedAttractionIds (IDs separados por pipe, cadena vacía si no hay ninguno)
            - travelDate (YYYY-MM-DD)

            Catálogo en tiempo de ejecución (obtenido dinámicamente antes de cada petición):
            Ciudades:
            {{CITY_CATALOG}}

            Atractivos:
            {{ATTRACTION_CATALOG}}

            Reglas de negocio:
            - Infiere el origen solo a partir del texto del prompt.
            - Si el origen no puede inferirse, deja originCityId como cadena vacía.
            - Si no hay una fecha explícita, usa la fecha de hoy más 30 días.
            - No inventes IDs fuera del catálogo.

            Ejemplo de forma de respuesta:
            {
              "intent": "plan_trip",
              "entities": {
                "travelerId": "1",
                "travelerSymbol": "traveler_1",
                "originCityId": "MADR",
                "targetCityIds": "LOGR",
                "requestedAttractionIds": "AT021",
                "travelDate": "2026-07-10"
              },
              "constraints": {},
              "confidence": 0.93
            }

