demo:
  travel:
    interpreter:
      type: http-llm
      http-llm:
        endpoint: ${DEMO_TRAVEL_LLM_ENDPOINT:http://localhost:11434/api/generate}
        api-key: ${DEMO_TRAVEL_LLM_API_KEY:}
        timeout: ${DEMO_TRAVEL_LLM_TIMEOUT:180s}
        request:
          model: ${DEMO_TRAVEL_LLM_MODEL:llama3.1:latest}
          stream: false
          temperature: 0
          catalog-base-url: ${DEMO_TRAVEL_CATALOG_BASE_URL:http://localhost:8085}
          catalog-cities-path: ${DEMO_TRAVEL_CATALOG_CITIES_PATH:/ciudades}
          catalog-attractions-path: ${DEMO_TRAVEL_CATALOG_ATTRACTIONS_PATH:/atractivos}
          system: |-
            You are an intent extraction component for a travel neuro-symbolic planner.
            Return only valid JSON with fields: intent, entities, constraints, confidence.
            Do not wrap output in markdown code fences.
            
            Before identifying the intent, resolve any implicit references, aliases, abbreviations, nicknames, synonyms, and equivalent expressions, and normalize them to their canonical forms.
            Also handle small spelling mistakes and typos by mapping to the closest catalog item when the meaning is clear.

            Examples:
              - a country's capital -> the corresponding city
              - a country's largest city -> the corresponding city
              - a country's demonym -> the corresponding country
              - an acronym -> its full name
              
            Then identify the user's intent and extract all relevant entities using their canonical values.

            Typo examples:
              - "uiniversidad de la rioja" -> "Universidad de La Rioja" -> requestedAttractionIds includes "AT021"
              - "museo del loubre" -> "Museo del Louvre"
            
            Based on the requested attractions, the destination cities can be inferred, but the origin city cannot; it must be inferred exclusively from the prompt text.
            Consider that the user may mention an origin city or a travel date, or may omit them. In such cases, the originCityId or travelDate field must be an empty string.

            intent must always be: plan_trip

            Use these entity keys exactly, all values are mandatory:
            - travelerId
            - travelerSymbol
            - originCityId
            - targetCityIds (pipe-separated IDs)
            - requestedAttractionIds (pipe-separated IDs, empty string if none)
            - travelDate (YYYY-MM-DD)

            Runtime catalog (fetched dynamically before each request):
            Cities:
            {{CITY_CATALOG}}

            Attractions:
            {{ATTRACTION_CATALOG}}
            
            you can infer the targetCityIds from the requestedAttractionIds by looking up the city each attraction belongs to in the catalog.
            If a user mentions an attraction by name (even with minor typos), prioritize setting requestedAttractionIds correctly.

            Business rules:
            - Infer origin only from the prompt text.
            - If origin cannot be inferred, set originCityId as empty string.
            - If no explicit date is present, use today's date plus 30 days.
            - Do not invent IDs outside the catalog.

            Example response shape:
            {
              "intent": "plan_trip",
              "entities": {
                "travelerId": "1",
                "travelerSymbol": "traveler_1",
                "originCityId": "MADR",
                "targetCityIds": "LOGR",
                "requestedAttractionIds": "AT021",
                "travelDate": "2026-07-10"
              },
              "constraints": {},
              "confidence": 0.93
            }
    planner:
      type: ${DEMO_TRAVEL_PLANNER_TYPE:docker}
      http-llm:
        endpoint: ${DEMO_TRAVEL_PLANNER_LLM_ENDPOINT:${DEMO_TRAVEL_LLM_ENDPOINT:http://localhost:11434/api/generate}}
        api-key: ${DEMO_TRAVEL_PLANNER_LLM_API_KEY:${DEMO_TRAVEL_LLM_API_KEY:}}
        timeout: ${DEMO_TRAVEL_PLANNER_LLM_TIMEOUT:180s}
        request:
          model: ${DEMO_TRAVEL_PLANNER_LLM_MODEL:${DEMO_TRAVEL_LLM_MODEL:llama3.1:latest}}
          stream: false
          temperature: 0
          system: |-
            You are an action planner component for a travel neuro-symbolic framework.
            Return only valid JSON with fields: success, message, rawPlan, actions.
            actions must be an array of objects with fields: name, arguments.
            Allowed actions only:
            - book-flight(travelerSymbol, originCityId, destinationCityId)
            - book-hotel(travelerSymbol, hotelId, cityId)
            - visit-attraction(travelerSymbol, attractionId, cityId)
            Use only identifiers already present in the provided planning problem.
            Do not wrap output in markdown code fences.

logging:
  level:
    com.tesis.nsframework.llm.http: DEBUG