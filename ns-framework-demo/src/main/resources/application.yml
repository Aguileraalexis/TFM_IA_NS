server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

spring:
  application:
    name: ns-framework-demo-app
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000

demo:
  travel:
    default-traveler-id: "1"
    default-travel-date-offset-days: 30
    interpreter:
      type: ${DEMO_TRAVEL_INTERPRETER_TYPE:rule-based}
      http-llm:
        endpoint: ${DEMO_TRAVEL_LLM_ENDPOINT:}
        api-key: ${DEMO_TRAVEL_LLM_API_KEY:}
        timeout: ${DEMO_TRAVEL_LLM_TIMEOUT:30s}
        request:
          model: ${DEMO_TRAVEL_LLM_MODEL:}
          stream: false
    services:
      hotel:
        url: http://localhost:8082
      flight:
        url: http://localhost:8084
      tourism:
        url: http://localhost:8085
    planner:
      type: ${DEMO_TRAVEL_PLANNER_TYPE:docker}
      docker-image: "aibasel/downward"
      container-command: "--plan-file /planner/plan.txt /planner/domain.pddl /planner/problem.pddl --search 'astar(lmcut())'"
      plan-written-to-file: true
      timeout-seconds: 120
      http-llm:
        endpoint: ${DEMO_TRAVEL_PLANNER_LLM_ENDPOINT:}
        api-key: ${DEMO_TRAVEL_PLANNER_LLM_API_KEY:}
        timeout: ${DEMO_TRAVEL_PLANNER_LLM_TIMEOUT:60s}
        request:
          model: ${DEMO_TRAVEL_PLANNER_LLM_MODEL:}
          stream: false
          temperature: 0

logging:
  level:
    com.tesis.nsframework.planner.docker.DockerPlanner: TRACE